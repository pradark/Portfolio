name: Update dashboard

on:
  # Daily at 22:30 UTC — ~1.5h after US market close (21:00 UTC std / 20:00 UTC DST)
  schedule:
    - cron: "30 22 * * 1-5"
  # Allow manual runs from the Actions tab
  workflow_dispatch: {}
  # Also rebuild on pushes that change the build script or workflow itself
  push:
    branches: [main]
    paths:
      - "scripts/build.py"
      - "requirements.txt"
      - ".github/workflows/update.yml"

permissions:
  contents: write   # needed to commit the refreshed index.html
  pages: write      # for the Pages deploy step
  id-token: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build dashboard
        run: python scripts/build.py

      - name: Commit updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh dashboard $(date -u +'%Y-%m-%d')"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
